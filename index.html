<!DOCTYPE html>
<html><head><meta charset="UTF-8"><title>Fleet GLB Viewer</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a12;color:#aaa;font-family:monospace;overflow:hidden;height:100vh}
#c{width:100%;height:100%;display:block}
#ui{position:fixed;top:10px;left:10px;z-index:10;display:flex;flex-direction:column;gap:4px}
.btn{background:rgba(40,200,120,0.1);border:1px solid rgba(40,200,120,0.3);color:#28c878;font:11px monospace;padding:8px 16px;cursor:pointer;letter-spacing:1px}
.btn:hover,.btn.on{background:rgba(40,200,120,0.2);border-color:rgba(40,200,120,0.6)}
#info{position:fixed;bottom:10px;left:10px;font:10px monospace;color:#555;z-index:10}
a{color:#28c878;font-size:10px;margin-top:4px}
</style></head><body>
<canvas id="c"></canvas>
<div id="ui">
  <div style="color:#28c878;font-size:13px;margin-bottom:6px;letter-spacing:2px">FLEET VIEWER</div>
  <button class="btn on" onclick="load('ESV_Pathfinder.glb',this)">PATHFINDER</button>
  <button class="btn" onclick="load('CSV_Ironworks.glb',this)">IRONWORKS</button>
  <button class="btn" onclick="load('RSV_Tessera.glb',this)">TESSERA</button>
  <button class="btn" onclick="load('FRV_Outrider.glb',this)">OUTRIDER</button>
  <button class="btn" onclick="load('CFV_Mule_Sprint.glb',this)">MULE SPRINT</button>
  <button class="btn" onclick="load('CFV_Mule_Longhauler.glb',this)">MULE LONG</button>
  <button class="btn" onclick="load('CFV_Mule_Tanker.glb',this)">MULE TANKER</button>
  <a href="fleet_viewer.html">Procedural fleet viewer →</a>
</div>
<div id="info">Drag to orbit · Scroll to zoom</div>

<script type="importmap">{"imports":{"three":"https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js","three/addons/":"https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"}}</script>
<script type="module">
import * as THREE from 'three';
import {GLTFLoader} from 'three/addons/loaders/GLTFLoader.js';
import {OrbitControls} from 'three/addons/controls/OrbitControls.js';

const scene=new THREE.Scene();
scene.fog=new THREE.FogExp2(0x0a0a12,0.003);
const camera=new THREE.PerspectiveCamera(50,innerWidth/innerHeight,0.1,500);
camera.position.set(15,10,20);
const renderer=new THREE.WebGLRenderer({canvas:document.getElementById('c'),antialias:true});
renderer.setSize(innerWidth,innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio,2));
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.8;

// Lighting
scene.add(new THREE.AmbientLight(0x1a2a3a,0.8));
const sun=new THREE.DirectionalLight(0xffeedd,2.4);
sun.position.set(50,30,-20);scene.add(sun);
scene.add(new THREE.DirectionalLight(0x4080ff,0.6).translateX(-30).translateY(-10).translateZ(30));
scene.add(new THREE.DirectionalLight(0x4af0c0,0.7).translateX(-20).translateY(5).translateZ(-40));

// Stars
const sg=new THREE.BufferGeometry();
const sp=new Float32Array(3000*3);
for(let i=0;i<3000;i++){const t=Math.random()*Math.PI*2,p=Math.acos(2*Math.random()-1),r=80+Math.random()*120;sp[i*3]=r*Math.sin(p)*Math.cos(t);sp[i*3+1]=r*Math.sin(p)*Math.sin(t);sp[i*3+2]=r*Math.cos(p);}
sg.setAttribute('position',new THREE.BufferAttribute(sp,3));
scene.add(new THREE.Points(sg,new THREE.PointsMaterial({color:0xffffff,size:0.1,sizeAttenuation:true})));

const controls=new OrbitControls(camera,renderer.domElement);
controls.enableDamping=true;controls.dampingFactor=0.05;
controls.minDistance=5;controls.maxDistance=100;
controls.autoRotate=true;controls.autoRotateSpeed=0.5;

const loader=new GLTFLoader();
let current=null;

window.load=function(file,btn){
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('on'));
  if(btn)btn.classList.add('on');
  if(current){scene.remove(current);current.traverse(c=>{if(c.geometry)c.geometry.dispose();if(c.material){if(Array.isArray(c.material))c.material.forEach(m=>m.dispose());else c.material.dispose();}});}
  document.getElementById('info').textContent='Loading '+file+'...';
  loader.load(file,gltf=>{
    current=gltf.scene;
    scene.add(current);
    const box=new THREE.Box3().setFromObject(current);
    const size=box.getSize(new THREE.Vector3());
    const center=box.getCenter(new THREE.Vector3());
    const maxDim=Math.max(size.x,size.y,size.z);
    controls.target.copy(center);
    camera.position.copy(center).add(new THREE.Vector3(maxDim*0.8,maxDim*0.5,maxDim*0.8));
    controls.update();
    let tris=0;current.traverse(c=>{if(c.isMesh&&c.geometry)tris+=(c.geometry.index?c.geometry.index.count/3:c.geometry.attributes.position.count/3);});
    document.getElementById('info').textContent=file+' · '+Math.round(tris).toLocaleString()+' tris · '+gltf.scene.children.length+' nodes';
  },
  xhr=>{document.getElementById('info').textContent='Loading '+file+'... '+(xhr.loaded/1024|0)+'KB';},
  err=>{document.getElementById('info').textContent='FAILED to load '+file;console.error(err);});
};

addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});
function animate(){requestAnimationFrame(animate);controls.update();renderer.render(scene,camera);}
animate();

load('ESV_Pathfinder.glb',document.querySelector('.btn'));
</script>
</body></html>
